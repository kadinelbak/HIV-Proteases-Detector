seed: 42
device: auto

paths:
  results_dir: results
  checkpoint_path: results/best_model.pth

data:
  fingerprint_bits: 1024
  fingerprint_radius: 2
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  batch_size_train: 256
  batch_size_eval: 512
  num_workers: 2

model:
  input_dim: 1024
  hidden_dim_1: 512
  hidden_dim_2: 256
  dropout: 0.5

training:
  epochs: 50
  learning_rate: 0.001

plots:
  dpi: 140
  show_plots: true
  save_plots: true
  loss_plot_path: results/loss_curve.png
  roc_plot_path: results/roc_curve.png
